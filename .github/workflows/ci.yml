name: CI

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

jobs:
  gdlint:
    name: gdlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Setup gdtoolkit
        uses: Scony/godot-gdscript-toolkit@b7a4935fc6483d51837f7080598dad456f4f7645 # 4.5.0

      - name: Lint
        run: gdlint .

  gdformat:
    name: gdformat
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Setup gdtoolkit
        uses: Scony/godot-gdscript-toolkit@b7a4935fc6483d51837f7080598dad456f4f7645 # 4.5.0

      - name: Check formatting
        run: gdformat --check .

  gut:
    name: GUT
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@f166999204a4f2722c6fe042fbaa3b3ea0d9c789 # v2.4.1
        with:
          version: "4.6.2"
          use-dotnet: false

      # Build Godot's class_name registry in .godot/ — without this, GUT bails
      # out because GutTest and friends aren't registered.
      - name: Import project
        run: godot --headless --import

      - name: Run GUT
        run: godot --headless -s addons/gut/gut_cmdln.gd -gdir=res://tests -ginclude_subdirs -gexit
